<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulateur de stabilité — Maneko</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Roboto', system-ui, sans-serif; box-sizing: border-box; }
      body { margin: 0; padding: 0; }
      input[type=range] { -webkit-appearance: none; appearance: none; }
      input[type=range]::-webkit-slider-runnable-track {
        background: linear-gradient(to right, var(--accent, #27AE60) var(--fill-pct, 0%), transparent var(--fill-pct, 0%));
        height: 6px; border-radius: 3px;
      }
      input[type=range]::-moz-range-track { background: transparent; height: 6px; border: none; border-radius: 3px; }
      input[type=range]::-moz-range-progress { background: var(--accent, #27AE60); height: 6px; border-radius: 3px; }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--accent, #27AE60);
        cursor: pointer;
        border: 2px solid rgba(255,255,255,0.85);
        box-shadow: 0 1px 8px rgba(0,0,0,0.22);
        margin-top: -6px;
      }
      input[type=range]::-moz-range-thumb {
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--accent, #27AE60);
        cursor: pointer;
        border: 2px solid rgba(255,255,255,0.85);
        box-shadow: 0 1px 8px rgba(0,0,0,0.22);
      }
    </style>
  </head>
  <body style="margin:0;padding:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
